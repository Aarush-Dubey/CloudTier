version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: icms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - icms-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: icms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - icms-network
    healthcheck:
      test: nc -z localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: icms-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - icms-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 10s
      retries: 5

  # Dashboard & API
  dashboard:
    build: .
    container_name: icms-dashboard
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - KAFKA_SERVER=kafka:29092
    volumes:
      - ./:/app
    networks:
      - icms-network
    command: python dashboard.py

  # Data Producer
  producer:
    build: .
    container_name: icms-producer
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - KAFKA_SERVER=kafka:29092
      - MONGO_URI=mongodb://mongodb:27017/
    volumes:
      - ./:/app
    networks:
      - icms-network
    command: python producer.py
    restart: unless-stopped

  # Event Consumer
  consumer:
    build: .
    container_name: icms-consumer
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - KAFKA_SERVER=kafka:29092
      - MONGO_URI=mongodb://mongodb:27017/
    volumes:
      - ./:/app
    networks:
      - icms-network
    command: python consumer.py
    restart: unless-stopped

  # Migration Worker
  migrator:
    build: .
    container_name: icms-migrator
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    volumes:
      - ./:/app
    networks:
      - icms-network
    command: python migrator.py
    restart: unless-stopped

  # ML Optimizer
  optimizer:
    build: .
    container_name: icms-optimizer
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
    volumes:
      - ./:/app
    networks:
      - icms-network
    command: python optimizer.py
    restart: unless-stopped

networks:
  icms-network:
    driver: bridge

volumes:
  mongodb_data:
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CloudTier</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #181d21;
      --line: #2a333a;
      --text: #f3f6f8;
      --muted: #aeb8c0;
      --green: #48d597;
      --blue: #61b7ff;
      --red: #ff6b6b;
      --amber: #ffc857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0; font-size: 30px; letter-spacing: 0; }
    .tagline { color: var(--muted); margin-top: 4px; font-size: 14px; }
    .status { color: var(--green); font-weight: 700; }
    main { padding: 24px 32px 36px; display: grid; gap: 18px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 112px;
    }
    .label { color: var(--muted); font-size: 13px; }
    .value { font-size: 30px; font-weight: 800; margin-top: 10px; }
    .wide { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 14px; }
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 10px 8px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; }
    th { color: var(--muted); font-weight: 600; }
    .pill { display: inline-flex; padding: 4px 8px; border-radius: 999px; background: #24313a; color: var(--blue); }
    @media (max-width: 880px) {
      header { align-items: start; flex-direction: column; gap: 10px; padding: 20px; }
      main { padding: 18px 20px; }
      .grid, .wide { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>CloudTier</h1>
      <div class="tagline">Distributed cloud data optimizer</div>
    </div>
    <div class="status" id="status">syncing</div>
  </header>
  <main>
    <section class="grid">
      <div class="card"><div class="label">Datasets</div><div class="value" id="datasets">0</div></div>
      <div class="card"><div class="label">Cost Saved</div><div class="value" id="savings">0%</div></div>
      <div class="card"><div class="label">Events / Hour</div><div class="value" id="throughput">0</div></div>
      <div class="card"><div class="label">p95 API / Event</div><div class="value" id="p95">0 ms</div></div>
    </section>
    <section class="wide">
      <div class="card">
        <div class="label">Storage Tiers</div>
        <table>
          <thead><tr><th>Tier</th><th>Datasets</th></tr></thead>
          <tbody id="tiers"></tbody>
        </table>
      </div>
      <div class="card">
        <div class="label">Migration Queue</div>
        <table>
          <tbody id="migrations"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script>
    const fmt = new Intl.NumberFormat();
    async function refresh() {
      const res = await fetch('/api/overview');
      const data = await res.json();
      document.querySelector('#status').textContent = 'online';
      document.querySelector('#datasets').textContent = fmt.format(data.total_datasets);
      document.querySelector('#savings').textContent = `${data.costs.savings_percent}%`;
      document.querySelector('#throughput').textContent = fmt.format(Math.round(data.throughput.events_per_hour || 0));
      document.querySelector('#p95').textContent = `${data.throughput.p95_latency_ms || 0} ms`;
      document.querySelector('#tiers').innerHTML = data.backend_distribution
        .map(row => `<tr><td><span class="pill">${row._id || 'unknown'}</span></td><td>${fmt.format(row.count)}</td></tr>`)
        .join('');
      const m = data.migrations;
      document.querySelector('#migrations').innerHTML = `
        <tr><th>Pending</th><td>${m.pending}</td></tr>
        <tr><th>Running</th><td>${m.running}</td></tr>
        <tr><th>Complete</th><td>${m.completed}</td></tr>
        <tr><th>Failed</th><td>${m.failed}</td></tr>`;
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
